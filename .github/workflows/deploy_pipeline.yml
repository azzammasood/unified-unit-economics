name: deploy-pipeline

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      DUCKDB_PATH: ${{ github.workspace }}/warehouse.duckdb
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate synthetic CSVs (+ ingest to DuckDB file)
        run: |
          python data_gen/generator.py

      - name: Run dbt build (run + test)
        env:
          DBT_PROFILES_DIR: ${{ github.workspace }}/dbt_project
        run: |
          dbt --version
          dbt build --project-dir dbt_project --threads 1

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboard/package.json

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: |
          npm install --no-audit --no-fund --legacy-peer-deps

      - name: Build Evidence static site
        working-directory: dashboard
        env:
          DUCKDB_PATH: ${{ github.workspace }}/warehouse.duckdb
        run: |
          echo "== Evidence config debug =="
          pwd
          ls -la
          echo "-- evidence.config.yaml --"
          (test -f evidence.config.yaml && cat evidence.config.yaml) || echo "missing evidence.config.yaml"
          echo "-- sources --"
          ls -la sources || true
          echo "-- pages --"
          ls -la pages || true
          echo "-- getEvidenceConfig() --"
          node -e "import { getEvidenceConfig } from '@evidence-dev/sdk/config'; console.log(JSON.stringify(getEvidenceConfig(), null, 2));"
          npm run build

      - name: Locate Evidence build output (debug)
        run: |
          echo "== dashboard directory =="
          ls -la dashboard || true
          echo "== dashboard/build =="
          ls -la dashboard/build || true
          echo "== dashboard/.evidence =="
          ls -la dashboard/.evidence || true
          echo "== dashboard/.evidence/build =="
          ls -la dashboard/.evidence/build || true

      - name: Normalize build output to dashboard/build
        run: |
          if [ -d "dashboard/build" ]; then
            echo "Using dashboard/build"
            exit 0
          fi
          if [ -d "dashboard/.evidence/build" ]; then
            echo "Found dashboard/.evidence/build; copying to dashboard/build"
            mkdir -p dashboard/build
            cp -R dashboard/.evidence/build/* dashboard/build/
            exit 0
          fi
          echo "No Evidence build output directory found."
          exit 1

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

